<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать блюдо | QR-Меню.uz</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Golos Text', sans-serif;
  background: #0a0a0a;
  color: white;
  min-height: 100vh;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #1e1e1e;
  background: #0f0f0f;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #f5c842;
}

.back-btn {
  background: #1a1a1a;
  color: #888;
  border: 1px solid #2a2a2a;
  padding: 8px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Golos Text', sans-serif;
}

.main {
  max-width: 600px;
  margin: 0 auto;
  padding: 24px 16px;
}

.page-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

.page-sub {
  font-size: 13px;
  color: #555;
  margin-bottom: 24px;
}

.emoji-section {
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 16px;
}

.section-label {
  font-family: 'Unbounded', sans-serif;
  font-size: 11px;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.emoji-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.emoji-opt {
  width: 44px;
  height: 44px;
  background: #0a0a0a;
  border: 1.5px solid #1e1e1e;
  border-radius: 12px;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.emoji-opt:hover { border-color: #f5c842; }
.emoji-opt.selected {
  border-color: #f5c842;
  background: #161400;
}

.preview {
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.preview-emoji {
  width: 56px;
  height: 56px;
  background: #1a1a1a;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}

.preview-name {
  font-size: 16px;
  font-weight: 600;
  color: white;
}

.preview-price {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  color: #f5c842;
  margin-top: 4px;
}

.form-section {
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 16px;
}

.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 12px;
  color: #555;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input, select, textarea {
  width: 100%;
  padding: 13px 16px;
  background: #0a0a0a;
  border: 1px solid #1e1e1e;
  border-radius: 12px;
  color: white;
  font-size: 14px;
  font-family: 'Golos Text', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

input:focus, select:focus, textarea:focus {
  border-color: #f5c842;
}

select option { background: #111; }
textarea { min-height: 80px; resize: vertical; }

.photo-wrap {
  width: 100%;
  height: 160px;
  background: #0a0a0a;
  border: 1.5px dashed #2a2a2a;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.2s;
}

.photo-wrap:hover { border-color: #f5c842; }

.photo-placeholder {
  text-align: center;
  color: #444;
}

.photo-placeholder span { font-size: 32px; display: block; margin-bottom: 8px; }
.photo-placeholder p { font-size: 13px; }

#photoPreview {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.save-btn {
  width: 100%;
  background: #f5c842;
  color: #000;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Unbounded', sans-serif;
  transition: opacity 0.2s;
  margin-bottom: 10px;
}

.save-btn:hover { opacity: 0.9; }

.del-btn {
  width: 100%;
  background: #1a0000;
  color: #ff4444;
  border: 1px solid #3a0000;
  border-radius: 14px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Golos Text', sans-serif;
  transition: opacity 0.2s;
}

.del-btn:hover { opacity: 0.9; }

</style>
</head>
<body>

<div class="header">
  <div class="logo">🍽️ QR-Меню.uz</div>
  <button class="back-btn" onclick="window.location.href='products.html'">← Назад</button>
</div>

<div class="main">

  <div class="page-title">Редактировать блюдо</div>
  <div class="page-sub">Измените информацию о блюде</div>

  <!-- EMOJI -->
  <div class="emoji-section">
    <div class="section-label">Иконка блюда</div>
    <div class="emoji-grid">
      <div class="emoji-opt selected" onclick="selectEmoji(this)">🍚</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🥩</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🍜</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🥗</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🫓</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">☕</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🧃</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🍰</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🥟</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🍳</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🥘</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🍖</div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div class="preview-emoji" id="previewEmoji">🍚</div>
    <div>
      <div class="preview-name" id="previewName">Название блюда</div>
      <div class="preview-price" id="previewPrice">0 сум</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-section">
    <div class="section-label">Информация</div>

    <div class="form-group">
      <label>Название блюда</label>
      <input type="text" id="name"
        placeholder="Плов Ферганский"
        oninput="updatePreview()">
    </div>

    <div class="form-group">
      <label>Категория</label>
      <select id="category"></select>
    </div>

    <div class="form-group">
      <label>Цена (сум)</label>
      <input type="number" id="price"
        placeholder="45000"
        oninput="updatePreview()">
    </div>

    <div class="form-group">
  <label>Фото блюда (необязательно)</label>
  <div class="photo-wrap" id="photoWrap" onclick="document.getElementById('photoInput').click()">
    <div class="photo-placeholder" id="photoPlaceholder">
      <span>📷</span>
      <p>Нажмите чтобы изменить фото</p>
    </div>
    <img id="photoPreview" style="display:none">
  </div>
  <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="loadPhoto(this)">
</div>

    <div class="form-group">
      <label>Описание (необязательно)</label>
      <textarea id="description"
        placeholder="Настоящий узбекский плов с бараниной..."></textarea>
    </div>
  </div>

  <button class="save-btn" onclick="save()">
    Сохранить изменения ✓
  </button>

  <button class="del-btn" onclick="deleteProduct()">
    🗑 Удалить блюдо
  </button>

</div>

<script type="module">
  import { auth, db } from './firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { collection, getDocs, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  let selectedEmoji = '🍚';
  let photoData = null;
  let currentUid = null;
  let currentId = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUid = user.uid;

    const catsSnap = await getDocs(collection(db, 'cafes', currentUid, 'categories'));
    const sel = document.getElementById('category');
    catsSnap.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.data().name;
      opt.textContent = d.data().name;
      sel.appendChild(opt);
    });

    currentId = localStorage.getItem('editingProductId');
    if (!currentId) { window.location.href = 'products.html'; return; }

    const snap = await getDoc(doc(db, 'cafes', currentUid, 'products', currentId));
    if (!snap.exists()) { window.location.href = 'products.html'; return; }

    const p = snap.data();
    selectedEmoji = p.emoji || '🍚';

    document.getElementById('name').value = p.name;
    document.getElementById('price').value = p.price;
    document.getElementById('description').value = p.description || '';
    document.getElementById('category').value = p.category;
    document.getElementById('previewEmoji').textContent = selectedEmoji;
    document.getElementById('previewName').textContent = p.name;
    document.getElementById('previewPrice').textContent = Number(p.price).toLocaleString() + ' сум';

    if (p.photo) {
      photoData = p.photo;
      document.getElementById('photoPreview').src = p.photo;
      document.getElementById('photoPreview').style.display = 'block';
      document.getElementById('photoPlaceholder').style.display = 'none';
    }

    document.querySelectorAll('.emoji-opt').forEach(el => {
      el.classList.toggle('selected', el.textContent === selectedEmoji);
    });
  });

  window.selectEmoji = function(el) {
    document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedEmoji = el.textContent;
    document.getElementById('previewEmoji').textContent = selectedEmoji;
  }

  window.updatePreview = function() {
    const name = document.getElementById('name').value || 'Название блюда';
    const price = document.getElementById('price').value || '0';
    document.getElementById('previewName').textContent = name;
    document.getElementById('previewPrice').textContent = Number(price).toLocaleString() + ' сум';
  }

  window.loadPhoto = function(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      photoData = e.target.result;
      document.getElementById('photoPreview').src = photoData;
      document.getElementById('photoPreview').style.display = 'block';
      document.getElementById('photoPlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  window.save = async function() {
    const name = document.getElementById('name').value.trim();
    const price = document.getElementById('price').value;
    const category = document.getElementById('category').value;
    const description = document.getElementById('description').value.trim();

    if (!name) { alert('Введите название блюда'); return; }
    if (!price) { alert('Введите цену'); return; }

    await setDoc(doc(db, 'cafes', currentUid, 'products', currentId), {
      id: currentId,
      name, price, category, description,
      emoji: selectedEmoji,
      photo: photoData || '',
      updatedAt: new Date().toISOString()
    });

    window.location.href = 'products.html';
  }

  window.deleteProduct = async function() {
    if (!confirm('Удалить это блюдо?')) return;
    await deleteDoc(doc(db, 'cafes', currentUid, 'products', currentId));
    window.location.href = 'products.html';
  }
</script>

</body>
</html>
