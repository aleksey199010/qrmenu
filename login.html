<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход | QR-Меню.uz</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Golos Text', sans-serif;
  background: #0a0a0a;
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 400px;
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 24px;
  padding: 36px 28px;
}

.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #f5c842;
  text-align: center;
  margin-bottom: 28px;
}

.logo span { font-size: 28px; display: block; margin-bottom: 8px; }

h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
}

.sub {
  font-size: 13px;
  color: #555;
  text-align: center;
  margin-bottom: 28px;
}

.form-group {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 12px;
  color: #666;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input {
  width: 100%;
  padding: 14px 16px;
  background: #0a0a0a;
  border: 1px solid #1e1e1e;
  border-radius: 12px;
  color: white;
  font-size: 15px;
  font-family: 'Golos Text', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

input:focus { border-color: #f5c842; }

.btn {
  width: 100%;
  background: #f5c842;
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Unbounded', sans-serif;
  margin-top: 8px;
  transition: opacity 0.2s;
}

.btn:hover { opacity: 0.9; }

.link {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #555;
}

.link a {
  color: #f5c842;
  text-decoration: none;
  font-weight: 600;
}

.back {
  text-align: center;
  margin-top: 16px;
}

.back a {
  font-size: 12px;
  color: #444;
  text-decoration: none;
}

.back a:hover { color: #888; }

</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <span>🍽️</span>
    QR-Меню.uz
  </div>

  <h1>Добро пожаловать</h1>
  <div class="sub">Войдите в кабинет вашего кафе</div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" placeholder="cafe@example.com">
  </div>

  <div class="form-group">
    <label>Пароль</label>
    <input type="password" placeholder="••••••••">
  </div>

  <button class="btn" onclick="login()">
  Войти →
</button>

  <div class="link">
    Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
  </div>

  <div class="back">
    <a href="index.html">← На главную</a>
  </div>

</div>

<script type="module">
  import { auth } from './firebase.js';
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  window.login = async function() {
    const email = document.querySelector('input[type="email"]').value.trim();
    const password = document.querySelector('input[type="password"]').value;

    if (!email || !password) {
      alert('Введите email и пароль');
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'dashboard.html';
    } catch (error) {
      if (error.code === 'auth/user-not-found') {
        alert('Пользователь не найден');
      } else if (error.code === 'auth/wrong-password') {
        alert('Неверный пароль');
      } else if (error.code === 'auth/invalid-email') {
        alert('Неверный email');
      } else {
        alert('Ошибка входа: ' + error.message);
      }
    }
  }
</script>

</body>
</html>
