<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Блюда | QR-Меню.uz</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Golos Text', sans-serif;
  background:#0a0a0a;
  color:white;
  min-height:100vh;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid #1e1e1e;
  background:#0f0f0f;
  position:sticky;
  top:0;
  z-index:50;
}

.logo {
  font-family:'Unbounded',sans-serif;
  font-size:16px;
  font-weight:700;
  color:#f5c842;
}

.back-btn {
  background:#1a1a1a;
  color:#888;
  border:1px solid #2a2a2a;
  padding:8px 16px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
}

.main {
  max-width:600px;
  margin:0 auto;
  padding:24px 16px;
}

.page-title {
  font-family:'Unbounded',sans-serif;
  font-size:20px;
  font-weight:700;
}

.page-sub {
  font-size:13px;
  color:#555;
  margin-bottom:20px;
}

.add-btn {
  width:100%;
  background:#f5c842;
  color:#000;
  border:none;
  border-radius:14px;
  padding:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

.dish {
  background:#111;
  border:1px solid #1e1e1e;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  gap:12px;
  align-items:center;
}

.dish-emoji {
  width:48px;
  height:48px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.dish-info { flex:1; }

.dish-name { font-weight:600; }

.dish-cat {
  font-size:12px;
  color:#666;
}

.dish-price {
  color:#f5c842;
  font-weight:700;
}

.category-tabs {
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:16px;
}

.category-tab {
  padding:8px 12px;
  border-radius:999px;
  background:#111;
  border:1px solid #1e1e1e;
  color:#888;
  white-space:nowrap;
  cursor:pointer;
}

.category-tab.active {
  background:#f5c842;
  color:#000;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🍽 QR-Меню</div>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← Назад</button>
</div>

<div class="main">

  <div class="page-title">Блюда</div>
  <div class="page-sub">Все блюда вашего меню</div>

  <input id="searchInput" placeholder="Поиск..." style="width:100%;padding:12px;margin-bottom:12px;background:#111;border:1px solid #1e1e1e;color:white;border-radius:10px;">

  <div id="tabs"></div>
  <div id="list"></div>

  <button class="add-btn" onclick="addProduct()">+ Добавить блюдо</button>

</div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

let currentUid = null;
let products = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) return (window.location.href='login.html');
  currentUid = user.uid;
  await load();
});

async function load() {

  const snap = await getDocs(collection(db,'cafes',currentUid,'products'));

  products = [];
  snap.forEach(d => products.push({id:d.id,...d.data()}));

  render();
}

function render() {

  const list = document.getElementById('list');
  const tabs = document.getElementById('tabs');

  const categories = ['Все', ...new Set(products.map(p=>p.category||'Без категории'))];

  tabs.innerHTML = categories.map((c,i)=>`
    <div class="category-tab ${i===0?'active':''}" data-cat="${c}">
      ${c}
    </div>
  `).join('');

  setTimeout(()=>{

    document.querySelectorAll('.category-tab').forEach(tab=>{
      tab.onclick = ()=>{

        document.querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');

        renderList(tab.dataset.cat);
      }
    });

  },0);

  renderList('Все');

  document.getElementById('searchInput').oninput = ()=> {
    const active = document.querySelector('.category-tab.active');
    renderList(active?.dataset.cat || 'Все');
  };
}

function renderList(category) {

  const search = document.getElementById('searchInput').value.toLowerCase();

  const filtered = products.filter(p=>{

    const catOk = category==='Все' || (p.category||'Без категории')===category;
    const searchOk = !search || (p.name||'').toLowerCase().includes(search);

    return catOk && searchOk;
  });

  document.getElementById('list').innerHTML = filtered.map(p=>`
    <div class="dish">
      <div class="dish-emoji">🍽</div>
      <div class="dish-info">
        <div class="dish-name">${p.name}</div>
        <div class="dish-cat">${p.category||''}</div>
      </div>
      <div class="dish-price">${p.price}</div>
    </div>
  `).join('');
}

window.addProduct = () => {
  window.location.href='add-product.html';
};

window.del = async (id)=>{
  await deleteDoc(doc(db,'cafes',currentUid,'products',id));
  await load();
};

window.edit = (id)=>{
  localStorage.setItem('editingProductId',id);
  window.location.href='edit-product.html';
};

</script>

</body>
</html>
