<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Блюда | QR-Меню.uz</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Golos Text', sans-serif;
  background:#0a0a0a;
  color:white;
  min-height:100vh;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid #1e1e1e;
  background:#0f0f0f;
  position:sticky;
  top:0;
  z-index:50;
}

.logo {
  font-family:'Unbounded',sans-serif;
  font-size:16px;
  font-weight:700;
  color:#f5c842;
}

.back-btn {
  background:#1a1a1a;
  color:#888;
  border:1px solid #2a2a2a;
  padding:8px 16px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
}

.main {
  max-width:600px;
  margin:0 auto;
  padding:24px 16px;
}

.page-title {
  font-family:'Unbounded',sans-serif;
  font-size:20px;
  font-weight:700;
}

.page-sub {
  font-size:13px;
  color:#555;
  margin-bottom:20px;
}

.add-btn {
  width:100%;
  background:#f5c842;
  color:#000;
  border:none;
  border-radius:14px;
  padding:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
  font-family:'Golos Text',sans-serif;
  font-size:15px;
}

.add-btn:hover {
  background:#ffd84d;
}

.dish {
  background:#111;
  border:1px solid #1e1e1e;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  gap:12px;
  align-items:center;
}

.dish-emoji {
  width:48px;
  height:48px;
  background:#1a1a1a;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  flex-shrink:0;
}

.dish-info { flex:1; }

.dish-name { font-weight:600; }

.dish-cat {
  font-size:12px;
  color:#666;
}

.dish-price {
  color:#f5c842;
  font-weight:700;
  white-space:nowrap;
}

.category-tabs {
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:16px;
  padding-bottom:4px;
  padding-left:36px;
  padding-right:36px;
  margin-left:-16px;
  margin-right:-16px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}

.category-tabs::-webkit-scrollbar { display:none; }

.category-tab {
  padding:8px 12px;
  border-radius:999px;
  background:#111;
  border:1px solid #1e1e1e;
  color:#888;
  white-space:nowrap;
  cursor:pointer;
  font-family:'Golos Text',sans-serif;
  font-size:13px;
  flex-shrink:0;
}

.category-tab.active {
  background:#f5c842;
  color:#000;
  border-color:#f5c842;
}

#searchInput {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  background:#111;
  border:1px solid #1e1e1e;
  color:white;
  border-radius:10px;
  font-family:'Golos Text',sans-serif;
  font-size:14px;
  outline:none;
}

#searchInput:focus {
  border-color:#333;
}

#searchInput::placeholder {
  color:#444;
}

.empty {
  text-align:center;
  color:#444;
  padding:40px 0;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🍽 QR-Меню</div>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← Назад</button>
</div>

<div class="main">

  <div class="page-title">Блюда</div>
  <div class="page-sub">Все блюда вашего меню</div>

 <input id="searchInput" placeholder="Поиск...">

  <div style="position:relative;">
    <button id="scrollLeft" onclick="document.getElementById('tabs').scrollBy({left:-150,behavior:'smooth'})" style="position:absolute;left:-8px;top:50%;transform:translateY(-50%);z-index:10;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">‹</button>
    <div class="category-tabs" id="tabs"></div>
    <button id="scrollRight" onclick="document.getElementById('tabs').scrollBy({left:150,behavior:'smooth'})" style="position:absolute;right:-8px;top:50%;transform:translateY(-50%);z-index:10;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">›</button>
  </div>
  <div id="list"></div>

  <button id="addProductBtn" class="add-btn">+ Добавить блюдо</button>

</div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { collection, getDocs, doc, deleteDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
let currentUid = null;
let products = [];
let activeCategory = 'Все';

let currentPlan = 'free';

onAuthStateChanged(auth, async (user) => {
  if (!user) return (window.location.href = 'login.html');
  currentUid = user.uid;
  const cafeSnap = await getDoc(doc(db, 'cafes', currentUid));
  currentPlan = cafeSnap.exists() ? cafeSnap.data().plan : 'free';
  await load();
});

async function load() {
  const snap = await getDocs(collection(db, 'cafes', currentUid, 'products'));
  products = [];
  snap.forEach(d => products.push({ id: d.id, ...d.data() }));
  render();
}

function render() {
  const categories = ['Все', ...new Set(products.map(p => p.category || 'Без категории'))];

  const tabs = document.getElementById('tabs');
  tabs.innerHTML = categories.map(c => `
    <div class="category-tab ${c === activeCategory ? 'active' : ''}" data-cat="${c}">${c}</div>
  `).join('');

  tabs.onclick = (e) => {
    const tab = e.target.closest('.category-tab');
    if (!tab) return;
    activeCategory = tab.dataset.cat;
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderList();
  };

  renderList();
}

function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();

  const filtered = products.filter(p => {
    const catOk = activeCategory === 'Все' || (p.category || 'Без категории') === activeCategory;
    const searchOk = !search || (p.name || '').toLowerCase().includes(search);
    return catOk && searchOk;
  });

  const list = document.getElementById('list');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Блюда не найдены</div>';
    return;
  }

  const limit = currentPlan === 'pro' ? 99999 : 10;
  list.innerHTML = filtered.map((p, i) => {
    const isHidden = currentPlan !== 'pro' && (products.indexOf(p) + 1) > limit;
    return `
    <div class="dish" style="${isHidden ? 'opacity:0.5;border-color:#2a1a00;' : ''}">
      <div class="dish-emoji">${p.emoji || '🍽'}</div>
      <div class="dish-info">
        <div class="dish-name">${p.name || '—'} ${isHidden ? '🔒' : ''}</div>
        <div class="dish-cat">${isHidden ? '<span style="color:#ff6b00;font-size:11px;">Скрыто от клиентов</span>' : (p.category || '')}</div>
      </div>
<div class="dish-price">
        ${isHidden ? '' : (p.oldPrice
          ? `${p.price} <span style="text-decoration:line-through;color:#555;font-size:11px;margin-left:4px;">${p.oldPrice}</span>`
          : p.price || ''
        )}
      </div>      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button onclick="edit('${p.id}')" style="background:#1a1a1a;color:#888;border:1px solid #2a2a2a;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;">✏️</button>
<button onclick="toggleAvailable('${p.id}', ${p.available !== false})" style="background:${p.available === false ? '#1a2a1a' : '#1a1a2a'};color:${p.available === false ? '#ff4444' : '#4a9a4a'};border:1px solid ${p.available === false ? '#2a4a2a' : '#2a2a4a'};border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;">${p.available === false ? '🔴' : '🟢'}</button>
        <button onclick="del('${p.id}')" style="background:#1a0a0a;color:#ff4444;border:1px solid #3a1a1a;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;">🗑</button>      </div>
    </div>
  `;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', renderList);

document.getElementById('addProductBtn').addEventListener('click', () => {
  window.location.href = 'add-product.html';
});

window.del = async (id) => {
  await deleteDoc(doc(db, 'cafes', currentUid, 'products', id));
  await load();
};

window.edit = (id) => {
  localStorage.setItem('editingProductId', id);
  window.location.href = 'edit-product.html';
};

window.toggleAvailable = async (id, currentlyAvailable) => {
  await updateDoc(doc(db, 'cafes', currentUid, 'products', id), {
    available: !currentlyAvailable
  });
  await load();
};
</script>

</body>
</html>
