<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Блюда | QR-Меню.uz</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Golos Text', sans-serif;
  background: #0a0a0a;
  color: white;
  min-height: 100vh;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #1e1e1e;
  background: #0f0f0f;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #f5c842;
}

.back-btn {
  background: #1a1a1a;
  color: #888;
  border: 1px solid #2a2a2a;
  padding: 8px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Golos Text', sans-serif;
}

.main {
  max-width: 600px;
  margin: 0 auto;
  padding: 24px 16px;
}

.page-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

.page-sub {
  font-size: 13px;
  color: #555;
  margin-bottom: 24px;
}

/* DISH ITEM */
.dish {
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.2s;
}

.dish:hover { border-color: #2a2a2a; }

.dish-emoji {
  width: 50px;
  height: 50px;
  background: #1a1a1a;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.dish-info { flex: 1; }

.dish-name {
  font-size: 15px;
  font-weight: 600;
  color: white;
  margin-bottom: 4px;
}

.dish-cat {
  font-size: 12px;
  color: #555;
}

.dish-price {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #f5c842;
  white-space: nowrap;
}

.dish-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.edit-btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #888;
  width: 34px;
  height: 34px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.del-btn {
  background: #1a0000;
  border: 1px solid #3a0000;
  color: #ff4444;
  width: 34px;
  height: 34px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.empty {
  text-align: center;
  padding: 40px 20px;
  color: #444;
}

.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

.add-btn {
  width: 100%;
  background: #f5c842;
  color: #000;
  border: none;
  border-radius: 14px;
  padding: 16px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Unbounded', sans-serif;
  margin-top: 8px;
  transition: opacity 0.2s;
}

.add-btn:hover { opacity: 0.9; }

</style>
</head>
<body>

<div class="header">
  <div class="logo">🍽️ QR-Меню.uz</div>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← Назад</button>
</div>

<div class="main">

  <div class="page-title">Блюда</div>
  <div class="page-sub">Все блюда вашего меню</div>

  <div id="list"></div>

  <button class="add-btn" onclick="window.location.href='add-product.html'">
    + Добавить блюдо
  </button>

</div>

<script type="module">
  import { auth, db } from './firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const emojis = {
    'Горячее':'🍲','Салаты':'🥗','Напитки':'☕',
    'Десерты':'🍰','Выпечка':'🫓','Завтраки':'🍳'
  };

  function getEmoji(cat) {
    for (const key in emojis) {
      if (cat && cat.includes(key)) return emojis[key];
    }
    return '🍽️';
  }

  let currentUid = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUid = user.uid;
    await load();
  });

  async function load() {
    const snap = await getDocs(collection(db, 'cafes', currentUid, 'products'));
    const products = [];
    snap.forEach(d => products.push({ id: d.id, ...d.data() }));

    const list = document.getElementById('list');

    if (products.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="icon">🍽️</div>
          <p>Пока нет блюд.<br>Добавьте первое!</p>
        </div>`;
      return;
    }

    const grouped = {};

products.forEach(p => {
  const category = p.category || 'Без категории';

  if (!grouped[category]) {
    grouped[category] = [];
  }

  grouped[category].push(p);
});

list.innerHTML = Object.entries(grouped).map(([category, items]) => `
  <div style="
    margin-top:24px;
    margin-bottom:12px;
    font-family:'Unbounded',sans-serif;
    font-size:14px;
    color:#f5c842;
  ">
    ${category} (${items.length})
  </div>

  ${items.map(p => `
    <div class="dish">
      ${p.photo
        ? `<div class="dish-emoji"><img src="${p.photo}" style="width:48px;height:48px;object-fit:cover;border-radius:10px;"></div>`
        : `<div class="dish-emoji">${p.emoji || getEmoji(p.category)}</div>`
      }

      <div class="dish-info">
        <div class="dish-name">${p.name}</div>
        <div class="dish-cat">${p.category || 'Без категории'}</div>
      </div>

      <div class="dish-price">
        ${Number(p.price).toLocaleString()} сум
      </div>

      <div class="dish-actions">
        <button class="edit-btn" onclick="edit('${p.id}')">✏️</button>
        <button class="del-btn" onclick="del('${p.id}')">🗑</button>
      </div>
    </div>
  `).join('')}
`).join('');
  }

  window.edit = function(id) {
    localStorage.setItem('editingProductId', id);
    window.location.href = 'edit-product.html';
  }

  window.del = async function(id) {
    if (!confirm('Удалить блюдо?')) return;
    await deleteDoc(doc(db, 'cafes', currentUid, 'products', id));
    await load();
  }
</script>

</body>
</html>
