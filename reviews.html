<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отзывы | QR-Меню.uz</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Golos Text', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #1e1e1e; background: #0f0f0f; position: sticky; top: 0; z-index: 50; }
.logo { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; color: #f5c842; }
.back-btn { background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 13px; font-family: 'Golos Text', sans-serif; }
.main { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
.page-title { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.page-sub { font-size: 13px; color: #555; margin-bottom: 24px; }

.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab { padding: 8px 16px; border-radius: 999px; background: #111; border: 1px solid #1e1e1e; color: #888; cursor: pointer; font-size: 13px; font-family: 'Golos Text', sans-serif; }
.tab.active { background: #f5c842; color: #000; border-color: #f5c842; }

.review-card { background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 16px; margin-bottom: 10px; }
.review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.review-name { font-weight: 600; font-size: 15px; }
.review-stars { font-size: 14px; }
.review-text { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 12px; }
.review-date { font-size: 11px; color: #444; margin-bottom: 12px; }
.review-actions { display: flex; gap: 8px; }

.btn-approve { background: #0a2a0a; color: #4ade80; border: 1px solid #1a4a1a; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Golos Text', sans-serif; }
.btn-approve:hover { background: #1a4a1a; }
.btn-reject { background: #1a0a0a; color: #ff4444; border: 1px solid #3a1a1a; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: 'Golos Text', sans-serif; }
.btn-reject:hover { background: #2a0a0a; }
.btn-delete { background: #1a1a1a; color: #666; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: 'Golos Text', sans-serif; }

.empty { text-align: center; color: #444; padding: 40px 0; font-size: 14px; }
.loading { text-align: center; color: #444; padding: 40px 0; font-size: 14px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat { background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 14px; text-align: center; }
.stat-num { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; color: #f5c842; }
.stat-label { font-size: 11px; color: #555; margin-top: 4px; }

.status-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.status-pending { background: #1a1400; color: #f5c842; border: 1px solid #3a2a00; }
.status-approved { background: #0a2a0a; color: #4ade80; border: 1px solid #1a4a1a; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🍽 QR-Меню</div>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← Назад</button>
</div>

<div class="main">
  <div class="page-title">Отзывы</div>
  <div class="page-sub">Модерация отзывов клиентов</div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="totalCount">—</div>
      <div class="stat-label">Всего</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="pendingCount">—</div>
      <div class="stat-label">На проверке</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="approvedCount">—</div>
      <div class="stat-label">Опубликовано</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('pending', this)">⏳ На проверке</div>
    <div class="tab" onclick="switchTab('approved', this)">✅ Опубликованные</div>
  </div>

  <div id="list"><div class="loading">Загрузка...</div></div>
</div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

let currentUid = null;
let allReviews = [];
let currentTab = 'pending';

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUid = user.uid;
  await loadReviews();
});

async function loadReviews() {
  const snap = await getDocs(collection(db, 'cafes', currentUid, 'reviews'));
  allReviews = [];
  snap.forEach(d => allReviews.push({ id: d.id, ...d.data() }));
  allReviews.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  document.getElementById('totalCount').textContent = allReviews.length;
  document.getElementById('pendingCount').textContent = allReviews.filter(r => r.status === 'pending').length;
  document.getElementById('approvedCount').textContent = allReviews.filter(r => r.status === 'approved').length;

  renderList();
}

function renderList() {
  const filtered = allReviews.filter(r => r.status === currentTab);
  const list = document.getElementById('list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">${currentTab === 'pending' ? 'Новых отзывов нет' : 'Нет опубликованных отзывов'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(r => `
    <div class="review-card" id="review-${r.id}">
      <div class="review-header">
        <div class="review-name">${r.name}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="review-stars">${'⭐'.repeat(r.stars || 5)}</div>
          <span class="status-badge ${r.status === 'pending' ? 'status-pending' : 'status-approved'}">
            ${r.status === 'pending' ? 'На проверке' : 'Опубликован'}
          </span>
        </div>
      </div>
      <div class="review-text">${r.text}</div>
      <div class="review-date">${new Date(r.createdAt).toLocaleDateString('ru', { day:'numeric', month:'long', year:'numeric' })}</div>
      <div class="review-actions">
        ${r.status === 'pending' ? `<button class="btn-approve" onclick="approve('${r.id}')">✅ Опубликовать</button>` : ''}
        ${r.status === 'approved' ? `<button class="btn-reject" onclick="unpublish('${r.id}')">↩ Снять</button>` : ''}
        <button class="btn-delete" onclick="remove('${r.id}')">🗑 Удалить</button>
      </div>
    </div>
  `).join('');
}

window.switchTab = function(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

window.approve = async function(id) {
  await updateDoc(doc(db, 'cafes', currentUid, 'reviews', id), { status: 'approved' });
  const r = allReviews.find(r => r.id === id);
  if (r) r.status = 'approved';
  document.getElementById('pendingCount').textContent = allReviews.filter(r => r.status === 'pending').length;
  document.getElementById('approvedCount').textContent = allReviews.filter(r => r.status === 'approved').length;
  renderList();
}

window.unpublish = async function(id) {
  await updateDoc(doc(db, 'cafes', currentUid, 'reviews', id), { status: 'pending' });
  const r = allReviews.find(r => r.id === id);
  if (r) r.status = 'pending';
  document.getElementById('pendingCount').textContent = allReviews.filter(r => r.status === 'pending').length;
  document.getElementById('approvedCount').textContent = allReviews.filter(r => r.status === 'approved').length;
  renderList();
}

window.remove = async function(id) {
  if (!confirm('Удалить отзыв?')) return;
  await deleteDoc(doc(db, 'cafes', currentUid, 'reviews', id));
  allReviews = allReviews.filter(r => r.id !== id);
  document.getElementById('totalCount').textContent = allReviews.length;
  document.getElementById('pendingCount').textContent = allReviews.filter(r => r.status === 'pending').length;
  document.getElementById('approvedCount').textContent = allReviews.filter(r => r.status === 'approved').length;
  renderList();
}
</script>

</body>
</html>
