<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR-Меню.uz — Цифровое меню для кафе Узбекистана</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf6ee;
  --brown: #1e1008;
  --brown-mid: #3a1f0d;
  --amber: #c8872a;
  --amber-light: #e8b84b;
  --terra: #b84a2a;
  --orange: #d95c2e;
  --text: #1e1008;
  --muted: #7a6558;
  --border: #e0d4c0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  overflow-x: hidden;
  position: relative;
}

/* GLOBAL AMBIENT LIGHT - fixed behind everything */
.page-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(232,184,75,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 60%, rgba(184,74,42,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 50% 90%, rgba(200,135,42,0.04) 0%, transparent 60%);
}

/* PREMIUM GRID - fixed, very subtle */
.page-grid {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(0deg, rgba(200,135,42,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,135,42,0.025) 1px, transparent 1px);
  background-size: 120px 120px;
}

/* ─── NAVIGATION ─── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(250,246,238,0.88);
  backdrop-filter: blur(18px) saturate(1.3);
  -webkit-backdrop-filter: blur(18px) saturate(1.3);
  border-bottom: 1px solid rgba(200,135,42,0.12);
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; color: var(--brown); letter-spacing: -0.3px; }
.nav-logo span { color: var(--amber); }
.nav-links { display: flex; gap: 18px; align-items: center; }
.nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--brown); }
.nav-btn {
  background: var(--brown); color: var(--amber-light);
  border: none; padding: 9px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  transition: all 0.25s;
  box-shadow: 0 2px 12px rgba(30,16,8,0.25);
}
.nav-btn:hover { background: var(--brown-mid); transform: translateY(-1px); }

/* ─── HERO ─── */
.hero-wrap {
  position: relative;
  padding: 130px 24px 70px;
  overflow: hidden;
}
.hero-wrap-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 100% 80% at 50% 0%, rgba(200,135,42,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 30%, rgba(232,112,58,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 15% 70%, rgba(200,135,42,0.06) 0%, transparent 55%);
}
.hero {
  max-width: 680px; margin: 0 auto;
  text-align: center; position: relative; z-index: 2;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(200,135,42,0.1);
  border: 1px solid rgba(200,135,42,0.25);
  color: var(--amber); font-size: 12px; font-weight: 600;
  padding: 7px 18px; border-radius: 30px; margin-bottom: 32px; letter-spacing: 0.3px;
}
.hero h1 {
  font-family: 'Fraunces', serif;
  font-size: clamp(36px, 8.5vw, 58px);
  font-weight: 900; line-height: 1.08;
  color: var(--brown); margin-bottom: 24px; letter-spacing: -1.5px;
}
.hero h1 em { font-style: italic; color: var(--amber); }
.hero p { font-size: 17px; color: var(--muted); line-height: 1.75; margin-bottom: 40px; max-width: 500px; margin-left: auto; margin-right: auto; }
.hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.btn-primary {
  background: linear-gradient(135deg, var(--orange) 0%, var(--terra) 100%);
  color: white; border: none; padding: 16px 34px; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  transition: all 0.3s; letter-spacing: -0.2px;
  box-shadow: 0 8px 28px rgba(184,74,42,0.35);
  text-decoration: none; display: inline-block;
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(184,74,42,0.45); }
.btn-secondary {
  background: rgba(255,255,255,0.75);
  color: var(--brown); border: 1.5px solid rgba(200,135,42,0.2);
  padding: 16px 30px; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  text-decoration: none; display: inline-block; transition: all 0.25s;
  box-shadow: 0 4px 16px rgba(30,16,8,0.06), inset 0 1px 0 rgba(255,255,255,0.8);
}
.btn-secondary:hover { background: white; border-color: rgba(200,135,42,0.4); transform: translateY(-2px); }
.hero-stats { display: flex; justify-content: center; gap: 0; margin-top: 56px; padding-top: 40px; border-top: 1px solid rgba(200,135,42,0.15); }
.hero-stat { flex: 1; max-width: 140px; padding: 0 16px; border-right: 1px solid rgba(200,135,42,0.12); }
.hero-stat:last-child { border-right: none; }
.hero-stat .num { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 700; color: var(--brown); letter-spacing: -0.5px; }
.hero-stat .lbl { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 500; }

/* ─── MOCKUP SECTION ─── */
.mockup-section {
  padding: 10px 24px 100px;
  display: flex; justify-content: center; align-items: center;
  position: relative; min-height: 580px;
}
.mockup-inner {
  position: relative;
  display: flex; justify-content: center; align-items: center;
  width: 560px;
}
/* phone glow */
.mockup-glow {
  position: absolute;
  bottom: -60px; left: 50%; transform: translateX(-50%);
  width: 380px; height: 160px;
  background: radial-gradient(ellipse, rgba(200,135,42,0.3) 0%, transparent 70%);
  filter: blur(30px); pointer-events: none; z-index: 1;
}
.phone {
  width: 235px; position: relative; z-index: 10;
  background: linear-gradient(160deg, #2d1a0a 0%, #1a0c05 100%);
  border-radius: 40px; padding: 14px 10px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 0 0 1.5px rgba(0,0,0,0.5),
    0 50px 100px rgba(20,10,4,0.6),
    0 20px 40px rgba(20,10,4,0.35),
    inset 0 1px 0 rgba(255,255,255,0.09),
    inset -1px 0 0 rgba(255,255,255,0.04);
  animation: phoneFloat 4s ease-in-out infinite;
}
/* glass shine on phone */
.phone-shine {
  position: absolute;
  top: 0; left: 0; right: 0; height: 55%;
  background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.01) 60%, transparent 100%);
  border-radius: 40px 40px 0 0;
  pointer-events: none; z-index: 11;
}
.phone-side {
  position: absolute;
  top: 20px; left: 0; width: 2px; height: 55%;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.13) 30%, rgba(255,255,255,0.06) 70%, transparent);
  border-radius: 2px; z-index: 11;
}
@keyframes phoneFloat {
  0%, 100% { transform: translateY(0px) rotate(0.5deg); }
  50% { transform: translateY(-12px) rotate(-0.5deg); }
}
.phone-notch { width: 72px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; margin: 0 auto 12px; }
.phone-screen { background: #faf6ef; border-radius: 28px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
.ps-head {
  background: linear-gradient(135deg, #3d2b1f 0%, #2a1a10 100%);
  padding: 14px 12px 10px; text-align: center; position: relative; overflow: hidden;
}
.ps-head-glow {
  position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 60px;
  background: radial-gradient(ellipse, rgba(232,184,75,0.2) 0%, transparent 70%);
  pointer-events: none;
}
.ps-name { font-family: 'Fraunces', serif; font-size: 14px; color: #e8b84b; font-weight: 700; position: relative; z-index: 1; }
.ps-info { font-size: 9px; color: #8a6a54; margin-top: 3px; }
.ps-tabs { display: flex; background: #f0e6d3; padding: 6px 8px 0; gap: 4px; }
.ps-tab { font-size: 8px; padding: 4px 8px; border-radius: 6px 6px 0 0; color: #8a6a54; font-weight: 600; }
.ps-tab.act { background: #faf6ef; color: #3d2b1f; box-shadow: 0 -2px 6px rgba(0,0,0,0.05); }
.ps-items { padding: 8px; }
.ps-item { display: flex; gap: 8px; padding: 8px; background: white; border-radius: 10px; margin-bottom: 6px; box-shadow: 0 1px 4px rgba(30,16,8,0.07); }
.ps-emoji { width: 32px; height: 32px; background: linear-gradient(135deg,#f5e8cc,#edd8b0); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.ps-iname { font-size: 9px; font-weight: 700; color: #3d2b1f; }
.ps-iprice { font-size: 9px; color: #c9942a; font-weight: 700; margin-top: 2px; }

/* ─── FLOATING CARDS ─── */
.float-card {
  position: absolute;
  background: rgba(255,255,255,0.72);
  border: 1px solid rgba(200,135,42,0.18);
  border-radius: 14px; padding: 12px 14px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 8px 32px rgba(30,16,8,0.13), inset 0 1px 0 rgba(255,255,255,0.85);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 12px; color: var(--brown);
  font-weight: 500; text-align: center;
  min-width: 110px; max-width: 140px;
  transition: all 0.3s ease; cursor: default; z-index: 8;
}
.float-card:hover {
  background: rgba(255,255,255,0.9);
  border-color: rgba(200,135,42,0.35);
  box-shadow: 0 16px 48px rgba(30,16,8,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
  transform: translateY(-4px) scale(1.04) !important;
}
.float-icon { display: block; font-size: 20px; margin-bottom: 6px; }
.float-label { display: block; font-weight: 600; margin-bottom: 2px; color: var(--brown); font-size: 11px; }
.float-value { display: block; font-weight: 600; color: var(--amber); font-size: 13px; }
.float-card.fc-tl { left: 0; top: 60px; animation: fcFloat1 4.5s ease-in-out infinite; }
.float-card.fc-tr { right: 0; top: 40px; animation: fcFloat2 4.2s ease-in-out infinite; }
.float-card.fc-bl { left: 20px; bottom: 100px; animation: fcFloat3 4.8s ease-in-out infinite; }
.float-card.fc-br { right: 0; bottom: 80px; animation: fcFloat4 4.3s ease-in-out infinite; }

@keyframes fcFloat1 {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50% { transform: translateY(-10px) rotate(-3deg); }
}
@keyframes fcFloat2 {
  0%,100% { transform: translateY(0) rotate(4deg); }
  50% { transform: translateY(8px) rotate(3deg); }
}
@keyframes fcFloat3 {
  0%,100% { transform: translateY(0) rotate(3deg); }
  50% { transform: translateY(-8px) rotate(4deg); }
}
@keyframes fcFloat4 {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(6px) rotate(-4deg); }
}

/* ─── SECTION DIVIDER ─── */
.section-divider {
  display: flex; justify-content: center; align-items: center;
  padding: 8px 24px; position: relative; z-index: 2;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; max-width: 160px;
  background: linear-gradient(90deg, transparent, rgba(200,135,42,0.18), transparent);
}
.section-divider-dot { margin: 0 12px; font-size: 10px; color: rgba(200,135,42,0.4); }

/* ─── PROBLEM ─── */
.problem {
  background: linear-gradient(160deg, #1e1008 0%, #2d1608 55%, #1a0c05 100%);
  padding: 90px 24px; text-align: center; position: relative; overflow: hidden;
}
.problem-glow {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,135,42,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 80%, rgba(184,74,42,0.07) 0%, transparent 55%);
}
.section-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 18px; }
.section-tag.light { color: rgba(200,135,42,0.5); }
.section-tag.dark { color: var(--amber); }
.problem h2 { font-family: 'Fraunces', serif; font-size: clamp(28px,6vw,40px); font-weight: 700; color: white; margin-bottom: 16px; line-height: 1.15; letter-spacing: -0.5px; position: relative; z-index: 2; }
.problem h2 em { font-style: italic; color: #e8b84b; }
.problem p { font-size: 15px; color: rgba(255,255,255,0.45); max-width: 460px; margin: 0 auto 52px; line-height: 1.75; position: relative; z-index: 2; }
.pain-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 500px; margin: 0 auto; position: relative; z-index: 2; }
.pain-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(200,135,42,0.15);
  border-radius: 20px; padding: 24px 18px; text-align: left;
  transition: all 0.3s ease; backdrop-filter: blur(10px); position: relative; overflow: hidden;
}
.pain-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(200,135,42,0.3), transparent); }
.pain-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(200,135,42,0.3); transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
.pain-icon { font-size: 28px; margin-bottom: 12px; display: block; }
.pain-title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9); margin-bottom: 6px; }
.pain-desc { font-size: 12px; color: rgba(255,255,255,0.35); line-height: 1.55; }
.pitch-link-dark {
  display: inline-block; margin-top: 36px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(200,135,42,0.2);
  color: rgba(255,255,255,0.7); padding: 12px 24px; border-radius: 12px;
  font-size: 14px; font-weight: 600; text-decoration: none;
  font-family: 'Instrument Sans', sans-serif; transition: all 0.25s; position: relative; z-index: 2;
}
.pitch-link-dark:hover { background: rgba(255,255,255,0.11); border-color: rgba(200,135,42,0.35); transform: translateY(-2px); }

/* ─── HOW ─── */
.how-wrap { background: linear-gradient(180deg, #f7f0e2 0%, var(--cream) 100%); padding: 90px 24px; position: relative; }
.how { max-width: 580px; margin: 0 auto; }
.how h2 { font-family: 'Fraunces', serif; font-size: clamp(28px,6vw,40px); font-weight: 700; color: var(--brown); margin-bottom: 8px; text-align: center; letter-spacing: -0.5px; }
.how h2 em { font-style: italic; color: var(--amber); }
.how-sub { font-size: 15px; color: var(--muted); text-align: center; margin-bottom: 52px; }
.steps { display: flex; flex-direction: column; }
.step { display: flex; gap: 22px; position: relative; }
.step:not(:last-child)::after { content: ''; position: absolute; left: 20px; top: 50px; width: 2px; height: calc(100% - 22px); background: linear-gradient(to bottom, rgba(200,135,42,0.25), transparent); }
.step-num { width: 42px; height: 42px; background: linear-gradient(135deg,rgba(200,135,42,0.15),rgba(200,135,42,0.05)); border: 1.5px solid rgba(200,135,42,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-size: 16px; font-weight: 700; color: var(--amber); flex-shrink: 0; box-shadow: 0 4px 12px rgba(200,135,42,0.12); }
.step-body { padding: 8px 0 36px; }
.step-title { font-size: 16px; font-weight: 600; color: var(--brown); margin-bottom: 6px; letter-spacing: -0.2px; }
.step-desc { font-size: 14px; color: var(--muted); line-height: 1.65; }

/* ─── FEATURES ─── */
.features { background: linear-gradient(180deg, #fffcf5 0%, #f7f0e0 100%); padding: 90px 24px; position: relative; overflow: hidden; }
.features-glow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 800px; height: 400px; background: radial-gradient(ellipse at 50% 0%, rgba(200,135,42,0.07) 0%, transparent 55%); filter: blur(40px); pointer-events: none; }
.features-inner { max-width: 580px; margin: 0 auto; position: relative; z-index: 2; }
.features h2 { font-family: 'Fraunces', serif; font-size: clamp(28px,6vw,40px); font-weight: 700; color: var(--brown); margin-bottom: 8px; text-align: center; letter-spacing: -0.5px; }
.features h2 em { font-style: italic; color: var(--amber); }
.features-sub { font-size: 15px; color: var(--muted); text-align: center; margin-bottom: 44px; }
.feat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.feat-card {
  background: rgba(255,255,255,0.75); border: 1px solid rgba(200,135,42,0.12);
  border-radius: 20px; padding: 22px 18px; transition: all 0.3s ease; cursor: default;
  backdrop-filter: blur(8px); box-shadow: 0 2px 12px rgba(30,16,8,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
}
.feat-card:hover { border-color: rgba(200,135,42,0.3); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(30,16,8,0.1), inset 0 1px 0 rgba(255,255,255,0.9); }
.feat-icon { font-size: 28px; margin-bottom: 12px; display: block; }
.feat-title { font-size: 14px; font-weight: 600; color: var(--brown); margin-bottom: 5px; }
.feat-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }

/* ─── WHY ─── */
.why-wrap { background: linear-gradient(180deg, #f7f0e0 0%, var(--cream) 100%); padding: 90px 24px; }
.why { max-width: 580px; margin: 0 auto; }
.why h2 { font-family: 'Fraunces', serif; font-size: clamp(28px,6vw,40px); font-weight: 700; color: var(--brown); margin-bottom: 8px; text-align: center; letter-spacing: -0.5px; }
.why h2 em { font-style: italic; color: var(--amber); }
.why-sub { font-size: 15px; color: var(--muted); text-align: center; margin-bottom: 44px; }
.why-list { display: flex; flex-direction: column; gap: 14px; }
.why-item { background: rgba(255,255,255,0.75); border: 1px solid rgba(200,135,42,0.1); border-radius: 20px; padding: 20px 18px; display: flex; gap: 16px; align-items: flex-start; transition: all 0.25s ease; box-shadow: 0 2px 10px rgba(30,16,8,0.04), inset 0 1px 0 rgba(255,255,255,0.8); }
.why-item:hover { border-color: rgba(200,135,42,0.25); transform: translateX(4px); box-shadow: 0 6px 24px rgba(30,16,8,0.08); }
.why-icon { width: 46px; height: 46px; background: linear-gradient(135deg,rgba(200,135,42,0.15),rgba(200,135,42,0.05)); border: 1px solid rgba(200,135,42,0.2); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 4px 12px rgba(200,135,42,0.1); }
.why-title { font-size: 15px; font-weight: 600; color: var(--brown); margin-bottom: 4px; }
.why-desc { font-size: 13px; color: var(--muted); line-height: 1.55; }

/* ─── FAQ ─── */
.faq-section { background: linear-gradient(180deg, #fffcf5 0%, #f7f0e0 100%); padding: 90px 24px; }
.faq-inner { max-width: 580px; margin: 0 auto; }
.faq-section h2 { font-family: 'Fraunces', serif; font-size: clamp(28px,6vw,40px); font-weight: 700; color: var(--brown); margin-bottom: 8px; text-align: center; letter-spacing: -0.5px; }
.faq-section h2 em { font-style: italic; color: var(--amber); }
.faq-sub { font-size: 15px; color: var(--muted); text-align: center; margin-bottom: 44px; }
.faq-item { border: 1px solid rgba(200,135,42,0.12); border-radius: 16px; margin-bottom: 10px; background: rgba(255,255,255,0.7); overflow: hidden; transition: border-color 0.25s; }
.faq-item.open { border-color: rgba(200,135,42,0.25); }
.faq-q { padding: 18px 22px; font-size: 14px; font-weight: 600; color: var(--brown); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.faq-arrow { font-size: 11px; color: var(--amber); transition: transform 0.25s; flex-shrink: 0; margin-left: 12px; }
.faq-item.open .faq-arrow { transform: rotate(180deg); }
.faq-a { display: none; padding: 0 22px 18px; font-size: 14px; color: var(--muted); line-height: 1.7; border-top: 1px solid rgba(200,135,42,0.1); padding-top: 14px; }
.faq-item.open .faq-a { display: block; }

/* ─── PRICING ─── */
.pricing-section { background: linear-gradient(180deg, var(--cream) 0%, #f0e8d4 100%); padding: 90px 24px; max-width: 580px; margin: 0 auto; }
.pricing-section h2 { font-family: 'Fra
