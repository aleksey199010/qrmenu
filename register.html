<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация | QR-Меню.uz</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Golos Text', sans-serif;
  background: #0a0a0a;
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 400px;
  background: #111;
  border: 1px solid #1e1e1e;
  border-radius: 24px;
  padding: 36px 28px;
}

.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #f5c842;
  text-align: center;
  margin-bottom: 28px;
}

.logo span { font-size: 28px; display: block; margin-bottom: 8px; }

h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
}

.sub {
  font-size: 13px;
  color: #555;
  text-align: center;
  margin-bottom: 28px;
}

.form-group { margin-bottom: 16px; }

label {
  display: block;
  font-size: 12px;
  color: #666;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input {
  width: 100%;
  padding: 14px 16px;
  background: #0a0a0a;
  border: 1px solid #1e1e1e;
  border-radius: 12px;
  color: white;
  font-size: 15px;
  font-family: 'Golos Text', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

input:focus { border-color: #f5c842; }

.btn {
  width: 100%;
  background: #f5c842;
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Unbounded', sans-serif;
  margin-top: 8px;
  transition: opacity 0.2s;
}

.btn:hover { opacity: 0.9; }

.free-badge {
  background: #161400;
  border: 1px solid #2a2200;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  color: #888;
  margin-bottom: 20px;
  text-align: center;
}

.free-badge span { color: #f5c842; font-weight: 600; }

.link {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #555;
}

.link a {
  color: #f5c842;
  text-decoration: none;
  font-weight: 600;
}

.back {
  text-align: center;
  margin-top: 16px;
}

.back a {
  font-size: 12px;
  color: #444;
  text-decoration: none;
}

</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <span>🍽️</span>
    QR-Меню.uz
  </div>

  <h1>Регистрация кафе</h1>
  <div class="sub">Создайте цифровое меню за 5 минут</div>

  <div class="free-badge">
    🎁 Первый месяц <span>Pro бесплатно</span>
  </div>

  <div class="form-group">
    <label>Название кафе</label>
    <input type="text" id="cafeName" placeholder="Café Osh, Лагман House...">
  </div>

  <div class="form-group">
    <label>Город</label>
    <input type="text" id="cafeCity" placeholder="Ташкент, Самарканд, Бухара...">
  </div>

  <div class="form-group">
    <label>Телефон</label>
    <input type="tel" placeholder="+998 90 000 00 00">
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" placeholder="cafe@example.com">
  </div>

  <div class="form-group">
    <label>Пароль</label>
    <input type="password" placeholder="Минимум 6 символов">
  </div>

  <div class="form-group">
    <label>Повторите пароль</label>
    <input type="password" placeholder="Повторите пароль">
  </div>

  <button class="btn" id="registerBtn">
  Создать кабинет →
</button>

  <div class="link">
    Уже есть аккаунт? <a href="login.html">Войти</a>
  </div>

  <div class="back">
    <a href="index.html">← На главную</a>
  </div>

</div>

<script>
</script>

<script type="module">
  import { auth, db } from './firebase.js';
  import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  document.getElementById('registerBtn').addEventListener('click', async function() {

    const name = document.getElementById('cafeName').value.trim();
    const phone = document.querySelector('input[type="tel"]').value.trim();
    const email = document.querySelector('input[type="email"]').value.trim();
    const password = document.querySelectorAll('input[type="password"]')[0].value;
    const password2 = document.querySelectorAll('input[type="password"]')[1].value;

    if (!name || !email || !password) {
      alert('Заполните все поля');
      return;
    }

    if (password !== password2) {
      alert('Пароли не совпадают');
      return;
    }

    if (password.length < 6) {
      alert('Пароль минимум 6 символов');
      return;
    }

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;

      const proExpiry = new Date();
      proExpiry.setDate(proExpiry.getDate() + 30);

      await setDoc(doc(db, 'cafes', uid), {
        name: name,
        phone: phone,
        email: email,
        createdAt: new Date().toISOString(),
        plan: 'pro',
        planExpiry: proExpiry.toISOString()
      });

      const city = document.getElementById('cafeCity').value.trim();
      await setDoc(doc(db, 'cafes', uid, 'settings', 'main'), {
        name: name,
        phone: phone,
        address: '',
        city: city,
        hours: '',
        lang: 'ru-uz'
      });

      const categories = ['Горячее', 'Салаты', 'Выпечка', 'Напитки', 'Десерты'];
      for (const cat of categories) {
        await setDoc(doc(db, 'cafes', uid, 'categories', cat), {
          name: cat,
          order: categories.indexOf(cat)
        });
      }

      window.location.href = './onboarding.html';
    } catch (error) {
      if (error.code === 'auth/email-already-in-use') {
        alert('Этот email уже используется');
      } else if (error.code === 'auth/invalid-email') {
        alert('Неверный формат email');
      } else {
        alert('Ошибка регистрации: ' + error.message);
      }
    }
});

</script>

</body>
</html>
